name: Deploy Cloud Functions (production)
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: daily-quote-deploy-prod

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    uses: yananob/cloud-functions-common/.github/workflows/deploy-cloud-functions.yaml@main
    with:
      function_name: 'daily-quote'
      project_id: 'nobu5-393106'
      region: 'us-west1'
      service_account_name: 'cloud-run-functions-deployer'
      gcp_project_number: '1035100650942'
      wip_pool_name: 'github-actions-pool'
      wip_provider_name: 'github-provider'
      secrets_project_id: 'nobu5-393106'
      # secrets_config: |-
      #   FIREBASE_CONFIG
      #   FIREBASE_CONFIG_READ
      #   LINE_TOKENS_N_TARGETS
      #   OPENAI_KEY_OML
      # gcs_source_dir: ./public/
      # gcs_bucket_name: oml-static
      # gcs_bucket_path: 
      # disable_gcs_cache: true
      deploy_http_trigger: true
      deploy_event_trigger: true
      http_max_instance_count: 1
      memory: '256M'
      http_timeout: '5m'
      event_timeout: '20m'
